name: Setup Node.js
description: Install Node.js with caching

inputs:
  working-directory:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci