name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 SERVER IMAGE
      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_NAME }}/app-server:latest
            ${{ secrets.DOCKER_NAME }}/app-server:${{ github.sha }}

      # 🐳 CLIENT IMAGE
      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_NAME }}/app-client:latest
            ${{ secrets.DOCKER_NAME }}/app-client:${{ github.sha }}