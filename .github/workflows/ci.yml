name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - "server/**"
              - ".github/**"
            client:
              - "client/**"
              - ".github/**"

  server:
    name: Server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    uses: ./.github/workflows/server-ci.yml
    with:
      run-build: true
    secrets: inherit

  client:
    name: Client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    uses: ./.github/workflows/client-ci.yml
    with:
      run-build: true
    secrets: inherit

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [server, client]
    if: always()

    steps:
      - name: Final status check
        run: |
          if [[ "${{ needs.server.result }}" == "failure" || "${{ needs.client.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"


