name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"

# Global environment variables for all jobs
env:
  npm_config_engine_strict: false

jobs:
  lint-server:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: server
        run: npm ci
      - name: Run lint
        working-directory: server
        run: npm run lint

  lint-client:
    name: Client Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Run lint
        working-directory: client
        run: npm run lint

  test-server:
    name: Server Tests
    needs: lint-server # Only run if linting passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: server
        run: npm ci
      - name: Run tests & coverage
        working-directory: server
        run: |
          npm run test:run
          npm run test:coverage

  test-client:
    name: Client Tests
    needs: lint-client # Only run if linting passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Run tests & coverage
        working-directory: client
        run: |
          npm run test:run
          npm run test:coverage
