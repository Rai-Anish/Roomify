name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - ".github/workflows/**"

jobs:
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm run test:run

      - name: Run coverage
        working-directory: server
        run: npm run test:coverage

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run tests
        working-directory: client
        run: npm run test:run

      - name: Run coverage
        working-directory: client
        run: npm run test:coverage
