services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: anish
      POSTGRES_PASSWORD: password
      POSTGRES_DB: roomify_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "5000:5000"
      - "5555:5555" 
    environment:
      - DATABASE_URL=postgresql://anish:password@db:5432/roomify_db
      - PORT=5000
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server

volumes:
  postgres_data: